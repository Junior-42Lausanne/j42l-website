services:
  next-app:
    container_name: nextjs-dev
    build:
      context: ./next
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
    volumes:
      - ./next:/app
      - next-build:/app/.next
      # - /app/node_modules
    # Do not remove, env for WSL to correctly hot load
    environment:
     - CHOKIDAR_USEPOLLING=true
     - CHOKIDAR_INTERVAL=100
     - WATCHPACK_POLLING=true
    env_file: "./next/.env"
    restart: unless-stopped
    depends_on:
      - strapi-app

  strapi-app:
    container_name: strapi-dev
    build:
      context: ./strapi
      dockerfile: Dockerfile.dev
    ports:
      - "1337:1337"
    volumes:
      - ./strapi:/opt/app
      - /opt/app/node_modules
    env_file: "./strapi/.env"
    environment:
      - NODE_ENV=development
      - STRAPI_URL=http://localhost:1337
    restart: unless-stopped
    depends_on:
      - db
  db:
    image: postgres:17-alpine
    container_name: strapi-db
    ports:
      - "5432:5432"
    env_file: "./strapi/.env"
    volumes:
      - strapi-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    depends_on:
      db-sync:
        condition: service_completed_successfully

  db-sync:
    image: rclone/rclone:latest
    container_name: strapi-db-sync
    volumes:
      - strapi-db-data:/pgdata
      - ./rclone.conf:/config/rclone/rclone.conf:ro
      - ./rclone-init.sh:/scripts/rclone-init.sh:ro
    entrypoint: ["/bin/sh", "/scripts/rclone-init.sh"]
    env_file: "./strapi/.env"
    restart: "no"

volumes:
  next-build:
  strapi-db-data:
