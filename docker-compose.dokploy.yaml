services:
  next-app:
    container_name: nextjs-prod
    # build:
    #   context: ./next
    #   dockerfile: Dockerfile
    image: theorangecake/nextjs-app:v0.1.0
    ports:
      - 3001
    environment:
      - PORT=3001
      - HOST=0.0.0.0
      - NODE_ENV=production
      - NEXT_PUBLIC_STRAPI_URL=https://admin.knifechopstudio.com
    networks:
      - dokploy-network
    depends_on:
      - strapi-app
    restart: unless-stopped

  strapi-app:
    container_name: strapi-prod
    # build:
    #   context: ./strapi
    #   dockerfile: Dockerfile
    image: theorangecake/strapi-app:v0.1.0
    ports:
      - 1337
    environment:
      - NODE_ENV=production
    volumes:
      - strapi-uploads:/opt/app/public/uploads
    networks:
      - dokploy-network
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    container_name: strapi-db-prod
    ports:
      - 5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - dokploy-network
    restart: unless-stopped

networks:
  dokploy-network:
    external: true

volumes:
  strapi-uploads:
  postgres-data:
